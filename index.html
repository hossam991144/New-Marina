<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Marina City</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    min-height:100vh;
    background:#050816;
    color:#fff;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    overflow-x:hidden;
    position:relative;
}

/* الخلفية */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#2563eb;
    filter:blur(160px);
    top:-180px;
    right:-180px;
    z-index:-1;
}

body::after{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:#06b6d4;
    filter:blur(160px);
    bottom:-180px;
    left:-180px;
    z-index:-1;
}

/* الكارت */

.container{

    width:100%;
    max-width:1000px;

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:50px;

    padding:50px;

    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    backdrop-filter:blur(20px);

    border-radius:35px;

    animation:show 1s ease;
}

.text{
    flex:1;
}

h1{
    font-size:58px;
    line-height:1.1;
    margin-bottom:20px;
}

h1 span{
    color:#38bdf8;
}

p{
    font-size:18px;
    color:#c8d3e4;
    line-height:1.8;
    margin-top:10px;
}

a{
    text-decoration:none;
}

button{

    margin-top:35px;

    padding:15px 40px;

    border:none;

    border-radius:50px;

    background:#2563eb;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:.3s;
}

button:hover{

    transform:translateY(-5px);

    box-shadow:0 0 30px #2563eb;
}

.shape{

    width:260px;
    height:260px;

    flex-shrink:0;

    border-radius:40px;

    overflow:hidden;

    transform:rotate(15deg);

    background:#2563eb;

    box-shadow:0 0 80px rgba(37,99,235,.7);

    animation:move 4s infinite ease-in-out;
}

.shape img{

    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes move{

    50%{

        transform:rotate(15deg) translateY(-25px);

    }

}

@keyframes show{

    from{

        opacity:0;
        transform:translateY(40px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}

/* الموبايل */

@media (max-width:800px){

.container{

    flex-direction:column-reverse;

    text-align:center;

    padding:30px 20px;

    gap:30px;

}

.text{

    width:100%;

}

h1{

    font-size:38px;

}

p{

    font-size:16px;

}

button{

    width:100%;
    max-width:260px;

}

.shape{

    width:180px;
    height:180px;

    transform:none;

}

}

</style>

</head>

<body>

<div class="container">

<div class="text">

<h1>
New <span>Marina City</span>
</h1>

<p>
Displaying descriptive and spatial data for city infrastructure facilities.
</p>

<a href="https://www.arcgis.com/apps/instant/basic/index.html?appid=4923971e1f1a4bc690fa082a4b930152" target="_blank">

<button>
View Project
</button>

</a>

</div>

<div class="shape">

<img src="المصرية الكويتية.png" alt="Company Logo">

</div>

</div>

</body>

</html>
