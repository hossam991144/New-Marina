<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Project</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{

    height:100vh;
    background:#050816;
    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;
}


/* خلفية */

body::before{

    content:"";

    position:absolute;

    width:500px;
    height:500px;

    background:#2563eb;

    filter:blur(150px);

    top:-150px;
    right:-150px;

}


body::after{

    content:"";

    position:absolute;

    width:450px;
    height:450px;

    background:#06b6d4;

    filter:blur(150px);

    bottom:-150px;
    left:-150px;

}



/* الكارت الرئيسي */

.container{

    width:85%;
    max-width:1000px;

    padding:50px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.15);

    backdrop-filter:blur(20px);

    border-radius:35px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    animation:show 1s ease;

}



.text{

    max-width:500px;

}


h1{

    font-size:60px;

    margin-bottom:20px;

}


h1 span{

    color:#38bdf8;

}



p{

    color:#b7c0d1;

    font-size:18px;

    line-height:1.8;

}



/* الزر */

button{

    margin-top:30px;

    padding:15px 40px;

    border:none;

    border-radius:50px;

    background:#2563eb;

    color:white;

    font-size:17px;

    cursor:pointer;

    transition:.3s;

}



button:hover{

    transform:translateY(-5px);

    box-shadow:0 0 30px #2563eb;

}



a{

    text-decoration:none;

}



/* مربع الصورة المتحرك */


.shape{

    width:260px;

    height:260px;

    border-radius:40px;

    overflow:hidden;

    transform:rotate(15deg);

    box-shadow:0 0 80px #2563eb;

    animation:move 4s infinite;

    background:#2563eb;

}



.shape img{

    width:100%;

    height:100%;

    object-fit:cover;

}




@keyframes move{

    50%{

        transform:rotate(15deg) translateY(-25px);

    }

}



@keyframes show{

    from{

        opacity:0;

        transform:translateY(40px);

    }

    to{

        opacity:1;

    }

}




@media(max-width:800px){


.container{

    flex-direction:column;

    text-align:center;

    gap:40px;

}


h1{

    font-size:40px;

}


.shape{

    width:220px;

    height:220px;

}


}


</style>


</head>


<body>


<div class="container">


<div class="text">


<h1>

New <span>Marina City</span>

</h1>


<p>

Displaying descriptive and spatial data for city infrastructure facilities

</p>



<a href="https://www.arcgis.com/apps/instant/basic/index.html?appid=4923971e1f1a4bc690fa082a4b930152">

<button>

View Project

</button>

</a>



</div>



<div class="shape">

<img src="المصرية الكويتية.png">

</div>



</div>



</body>

</html>
